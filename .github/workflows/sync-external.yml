name: Sync External Plugins and Skills

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Sync external content
        shell: bash
        run: bash .github/scripts/sync-external.sh

      - name: Commit and push (if any changes)
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync external plugins and skills" \
                     -m "Automated weekly sync from upstream sources."
          git push origin main
