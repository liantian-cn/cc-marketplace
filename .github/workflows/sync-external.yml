name: Sync External Plugins and Skills

on:
  schedule:
    # Weekly sync: Monday at 03:17 UTC (off-peak, avoids :00/:30 stampede)
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Sync external content
        shell: bash
        run: .github/scripts/sync-external.sh

      - name: Create Pull Request (if any changes)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected, skipping PR."
            exit 0
          fi

          echo "Changes detected, creating PR..."

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync-external-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync external plugins and skills

          Automated weekly sync from upstream sources.
          See .github/scripts/sync-external.sh for details.

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync external plugins and skills" \
            --body "🤖 Automated sync from external upstream sources.

          | Source | Target |
          |--------|--------|
          | \`anthropics/claude-plugins-official\` → \`external_plugins/playwright\` | \`plugins/playwright/\` |
          | \`anthropics/claude-plugins-official\` → \`plugins/skill-creator\` | \`plugins/skill-creator/\` |
          | \`obra/superpowers\` (excl. \`.git\`/\`.github\`) | \`plugins/superpowers/\` |
          | \`alirezarezvani/claude-skills\` → \`finance\` | \`plugins/finance/\` |
          | \`anthropics/skills\` → \`skills/docx\` | \`plugins/essentials/skills/docx/\` |
          | \`anthropics/skills\` → \`skills/pdf\` | \`plugins/essentials/skills/pdf/\` |
          | \`anthropics/skills\` → \`skills/pptx\` | \`plugins/essentials/skills/pptx/\` |
          | \`anthropics/skills\` → \`skills/xlsx\` | \`plugins/essentials/skills/xlsx/\` |

          🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            --base main \
            --head "$BRANCH"
