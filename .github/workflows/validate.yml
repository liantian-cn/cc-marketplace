name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: |
          echo "Checking marketplace.json..."
          test -f .claude-plugin/marketplace.json || (echo "ERROR: marketplace.json missing" && exit 1)
          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing: name'
          assert 'owner' in data, 'Missing: owner'
          assert 'plugins' in data, 'Missing: plugins'
          assert isinstance(data['plugins'], list), 'plugins must be array'
          print(f'OK: {len(data[\"plugins\"])} plugin(s) defined')
          "

      - name: Validate bundled plugins
        run: |
          echo "Validating bundled plugins..."
          set -e
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            echo "--- $plugin_name ---"
            if [ -f "$plugin_dir/.claude-plugin/plugin.json" ]; then
              python3 -c "
          import json
          with open('${plugin_dir}/.claude-plugin/plugin.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing name'
          print(f'  plugin.json: {data[\"name\"]} OK')
          "
            fi
            if [ -d "$plugin_dir/skills" ]; then
              count=$(find "$plugin_dir/skills" -name 'SKILL.md' | wc -l)
              echo "  Skills: $count"
            fi
            [ -f "$plugin_dir/.mcp.json" ] && echo "  MCP: present"
            echo "  PASSED"
          done
